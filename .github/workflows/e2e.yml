name: 'E2E'

# Runs the Playwright end-to-end suite against a real Home Assistant (Docker)
# serving the freshly built card. Required check for merging into master.
# See docs/E2E.md for the architecture.

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  e2e:
    name: Playwright e2e (real Home Assistant)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20.x'

      - name: Install root deps (card build)
        run: yarn install --frozen-lockfile

      - name: Install e2e deps + Playwright Chromium (with OS deps)
        working-directory: e2e
        run: |
          yarn install --frozen-lockfile
          npx playwright install --with-deps chromium

      - name: Run e2e suite (build -> HA up -> Playwright -> down)
        run: ./scripts/e2e.sh

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 7
