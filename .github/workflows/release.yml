name: Release

on:
  release:
    types: [published]

jobs:
  release:
    name: Prepare release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Build
      - name: Build
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '16.x'
      - run: cd $GITHUB_WORKSPACE
      - run: yarn
      - run: yarn build

      # Upload build file to the releas as an asset.
      - name: Upload zip to release
        uses: svenstaro/upload-release-action@29e53e917877a24fad85510ded594ab3c9ca12de # v2.11.5

        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: /home/runner/work/linked-lovelace-ui/linked-lovelace-ui/dist/linked-lovelace-ui.js
          asset_name: linked-lovelace-ui.js
          tag: ${{ github.ref }}
          overwrite: true
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: HACS Action
        uses: hacs/action@1ebf01c408f29afcb6406bd431bc98fd8cbb15aa # main (no release tags)
        with:
          category: "plugin"